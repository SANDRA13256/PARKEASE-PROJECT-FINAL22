{% load crispy_forms_tags %}
<form method="POST">
    {% csrf_token %}
    {{ form|crispy }}

    <div class="mb-3">
        <label class="form-label">Customer Name</label>
        {{ form.customer_name }}
    </div>

    <div class="mb-3">
        <label class="form-label">Service</label>
        {{ form.service }}
    </div>

    <button class="btn btn-primary w-100">Save</button>
</form>
