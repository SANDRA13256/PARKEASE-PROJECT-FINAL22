{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4>Add / Edit Service Price</h4>
        </div>

        <div class="card-body">

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Category</label>
                    {{ form.category }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Service</label>
                    {{ form.name }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Vehicle Size</label>
                    {{ form.vehicle_size }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Vehicle Model</label>
                    {{ form.model }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Price (UGX)</label>
                    {{ form.price }}
                </div>

                <button type="submit" class="btn btn-success">
                    Save Service Price
                </button>

                <a href="{% url 'service:serviceprice_list' %}"
                   class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>
    </div>

</div>

{% endblock %}
