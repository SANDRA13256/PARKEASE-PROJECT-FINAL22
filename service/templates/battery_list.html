<!DOCTYPE html>
<html>
<head>
    <title>Battery Services</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-3">
        <h3>Battery Services</h3>
        <a href="{% url 'add_battery' %}" class="btn btn-primary">+ Add Service</a>
    </div>

    <div class="card shadow">
        <div class="card-body">

            <table class="table table-bordered">
                <thead class="table-dark">
                    <tr>
                        <th>Customer</th>
                        <th>Type</th>
                        <th>Price</th>
                        <th>Receipt</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody>
                    {% for battery in batteries %}
                    <tr>
                        <td>{{ battery.customer_name }}</td>
                        <td>{{ battery.battery_type }}</td>
                        <td>{{ battery.price }}</td>
                        <td>{{ battery.receipt_number }}</td>
                        <td>{{ battery.date }}</td>

                        <td>
                            <a href="{% url 'delete_battery' battery.id %}" class="btn btn-sm btn-danger">Delete</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="6" class="text-center">No battery services found</td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
