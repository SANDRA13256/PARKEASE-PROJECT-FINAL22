{% extends 'base.html' %}

{% block content %}

<h3>User Management</h3>

<table class="table table-bordered">
    <thead class="table-dark">
        <tr>
            <th>Username</th>
            <th>Role</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user.username }}</td>
            <td>{{ user.role }}</td>
            <td>
                

                <form method="POST" action="{% url 'accounts:delete_user' user.id %}">
                    {% csrf_token %}
                    <button class="btn btn-danger btn-sm">Delete</button>
                </form>

            </td>
                 <td>
                    <a href="{% url 'accounts:update_user' user.id %}" class="btn btn-primary btn-sm">Edit</a>

                    <form method="POST" action="{% url 'accounts:delete_user' user.id %}" style="display:inline;">
                        {% csrf_token %}
                        <button class="btn btn-danger btn-sm">Delete</button>
                    </form>
                </td>
        </tr>
        {% endfor %}
    </tbody>

</table>

{% endblock %}
