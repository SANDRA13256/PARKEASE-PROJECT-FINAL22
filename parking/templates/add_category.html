{% extends "base.html" %}

{% block content %}
<div class="container mt-5">

    <div class="card shadow">
        <div class="card-header bg-success text-white">
            <h4 class="mb-0">Add Vehicle Category</h4>
        </div>

        <div class="card-body">

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Category Name</label>
                    <input type="text" name="name" class="form-control" placeholder="e.g. Car, Truck, Bike" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Day Rate</label>
                    <input type="number" name="day_rate" class="form-control" placeholder="Enter day rate" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Night Rate</label>
                    <input type="number" name="night_rate" class="form-control" placeholder="Enter night rate" required>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="{% url 'parking:category_list' %}" class="btn btn-secondary">
                        Back
                    </a>

                    <button type="submit" class="btn btn-success">
                        Save Category
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>
{% endblock %}
